[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "shanghai"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
ritual = "https://rpc.ritualfoundation.org"

[etherscan]
ritual = { key = "verifykey", url = "https://explorer.ritualfoundation.org/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
